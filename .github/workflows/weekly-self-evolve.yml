name: Weekly Self-Evolve

on:
  schedule:
    - cron: "0 9 * * 1" # Every Monday at 9 AM UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  self-evolve:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Self-Evolve
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}

            You are running as a weekly automated self-evolve job for the skill-sommelier repo.
            Follow the instructions in skills/ss-self-evolve/SKILL.md with these constraints:

            - Run exactly ONE iteration (do NOT loop or ask to continue — stop after Step 5)
            - In Step 5, apply only low-risk changes automatically (new skills, minor enhancements)
            - Skip any medium/high-risk changes entirely
            - After making changes, create a branch, commit, and open a PR for review

            Important context:
            - All skills must follow the ss- prefix naming convention
            - Skills live in skills/<skill-name>/SKILL.md
            - Read CLAUDE.md for repo conventions before making changes
          show_full_output: true
          claude_args: |
            --allowedTools "Bash,Read,Write,Edit,Glob,Grep,WebFetch,WebSearch"
