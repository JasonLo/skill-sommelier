name: Weekly Skill Discovery

on:
  schedule:
    - cron: "0 14 * * 0" # Sunday 2 PM UTC
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Discover and recommend skills
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_tools: "Bash(gh issue *),Bash(gh search *),Bash(gh api *),Bash(gh label *),Read,Glob"
          prompt: |
            You are a skill discovery agent. Your ONLY job is to search GitHub for new Claude Code skills and create a GitHub issue with recommendations. Do NOT create PRs, modify files, or push commits.

            ## Step 1: Check for existing open issue

            Run: gh issue list --repo "$GITHUB_REPOSITORY" --label "skill-recommendation" --state open --json number --jq 'length'

            If the result is greater than 0, stop immediately — an open recommendation issue already exists.

            ## Step 2: Load context

            1. Read the file `.github/user-profile.md` to understand the user's tech stack and interests.
            2. List all directory names under `skills/` — these are the installed skill names.

            ## Step 3: Search GitHub for SKILL.md files

            Run these searches and collect results (repo fullName + file path):

            1. `gh search code 'filename:SKILL.md "name:" "description:"' --limit 50 --json repository,path`
            2. For each topic in [claude-code-skills, claude-skills, agent-skills, claude-code-skill]:
               `gh search repos --topic=TOPIC --sort=stars --limit 20 --json fullName`
               Then for each repo found, use the tree API to find SKILL.md files:
               `gh api "repos/OWNER/REPO/git/trees/HEAD?recursive=1" --jq '.tree[] | select(.path | test("SKILL\\.md$")) | .path'`

            ## Step 4: Deduplicate and filter

            - Merge all results and deduplicate by repo+path.
            - Exclude any result from the repo "JasonLo/skill-sommelier" (this repo).
            - Process up to 30 unique candidates.

            ## Step 5: Validate candidates

            For each candidate (up to 30), fetch the SKILL.md content:
            `gh api "repos/OWNER/REPO/contents/PATH" --jq '.content'`
            Then base64-decode it and extract the `name` and `description` from YAML frontmatter.

            Skip the candidate silently if:
            - The fetch fails
            - No `name` field is found in frontmatter
            - The name matches any installed skill from Step 2

            For valid candidates, also fetch repo metadata:
            `gh api "repos/OWNER/REPO" --jq '{stars: .stargazers_count, pushed: .pushed_at}'`

            Skip silently if this fails.

            ## Step 6: Rank top 10

            Score each candidate by relevance to the user profile (keyword matches in name + description), then by stars (descending), then by recency (most recently pushed first). Select the top 10.

            For each, compute a human-readable age label:
            - 0-1 days: "today"
            - 2-7 days: "Xd ago"
            - 8-30 days: "Xw ago"
            - 31-365 days: "Xmo ago"
            - >365 days: ">1y ago"

            ## Step 7: Create issue

            First ensure the label exists:
            `gh label create "skill-recommendation" --description "Automated skill recommendations" --color "0e8a16" --repo "$GITHUB_REPOSITORY" 2>/dev/null || true`

            Then create the issue with this exact format:

            Title: Weekly Skill Recommendations — YYYY-MM-DD

            Body:
            ```
            ## Weekly Skill Recommendations — YYYY-MM-DD

            Check the skills you want, then comment `@claude install the checked skills from this issue`.

            - [ ] **skill-name** | [owner/repo](https://github.com/owner/repo) | X stars | Updated Xd ago
              > Description text here

            - [ ] **another-skill** | [owner/repo](https://github.com/owner/repo) | X stars | Updated Xw ago
              > Description text here

            ### Already installed (skipped)
            skill-a, skill-b, skill-c

            ---
            *Auto-generated by ss-weekly-discover*
            ```

            Only include the "Already installed" section if any installed skills were encountered during filtering.

            Use: `gh issue create --repo "$GITHUB_REPOSITORY" --title "TITLE" --label "skill-recommendation" --body "BODY"`

            ## Important constraints

            - Do NOT create pull requests or modify any files in the repository.
            - Do NOT push any commits.
            - Handle all errors gracefully — if a single candidate fails to fetch, skip it and continue.
            - If zero candidates remain after filtering, stop without creating an issue and report that no new skills were found.
